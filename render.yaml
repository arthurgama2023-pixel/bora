services:
  - type: web
    name: detector-api
    env: node
    region: oregon
    plan: free
    buildCommand: cd detetive-viral/server && npm install
    startCommand: cd detetive-viral/server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: APIFY_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
