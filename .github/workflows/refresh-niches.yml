name: Refresh Niches (24h)

on:
  schedule:
    # Roda todo dia às 2AM UTC (você pode mudar o horário aqui)
    # Sintaxe: minuto hora dia-do-mês mês dia-da-semana
    - cron: '0 2 * * *'

  # Permite rodar manualmente no GitHub Actions UI (útil pra debug)
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger refresh endpoint
        run: |
          curl -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.BACKEND_URL }}/api/cron/refresh-niches" \
            --fail \
            --show-error

      - name: Log success
        run: echo "✅ Refresh concluído com sucesso"

      - name: On failure
        if: failure()
        run: echo "❌ Refresh falhou — confira o backend"
